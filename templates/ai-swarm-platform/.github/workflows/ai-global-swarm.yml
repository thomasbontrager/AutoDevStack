name: AI Global Swarm

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-swarm:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create config directories
        run: |
          mkdir -p config/history

      - name: Generate AI configs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run generate

      - name: Run swarm engine
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: npm run swarm

      - name: Upload analytics
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swarm-analytics
          path: |
            config/analytics.json
            config/viral-repos.json
            config/history/
          retention-days: 30

      - name: Commit updated analytics
        if: success()
        run: |
          git config --local user.email "ai-swarm@github-actions"
          git config --local user.name "AI Swarm Bot"
          git add config/analytics.json config/viral-repos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update swarm analytics [skip ci]"
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## 🌊 AI Swarm Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f config/analytics.json ]; then
            echo "### 📊 Analytics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat config/analytics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No analytics generated" >> $GITHUB_STEP_SUMMARY
          fi
