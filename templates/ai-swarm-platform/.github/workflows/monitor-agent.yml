name: Monitor Agent

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  monitor:
    name: Collect Swarm Analytics
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run setup
        run: node setup.js

      - name: Run monitor
        run: npm run monitor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit updated analytics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(monitor): update analytics snapshot [skip ci]"
          file_pattern: "config/analytics.json"
          commit_user_name: "AI Swarm Bot"
          commit_user_email: "swarm-bot@users.noreply.github.com"
