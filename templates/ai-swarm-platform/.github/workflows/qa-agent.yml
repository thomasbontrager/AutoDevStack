name: QA Agent

on:
  push:
    branches:
      - "**"
    paths:
      - "config/*.json"
      - "scripts/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run setup (ensure config files exist)
        run: node setup.js

      - name: Run QA validation
        run: npm run qa
