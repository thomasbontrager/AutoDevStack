name: QA Agent

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'config/**'
  pull_request:
    paths:
      - 'config/**'
  workflow_dispatch:

jobs:
  qa-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run QA validation
        run: npm run qa

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON files..."
          for file in config/*.json; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              jq empty "$file" || exit 1
            fi
          done
          echo "✅ All JSON files are valid"

      - name: Check required fields
        run: |
          echo "Checking required configuration fields..."
          node -e "
            const fs = require('fs');
            const configs = ['dev', 'prod', 'copilot'];
            const requiredFields = ['environment', 'version', 'swarm', 'repository', 'analytics'];

            let valid = true;
            for (const env of configs) {
              const config = JSON.parse(fs.readFileSync(\`config/\${env}.json\`, 'utf-8'));
              for (const field of requiredFields) {
                if (!config[field]) {
                  console.error(\`❌ Missing field '\${field}' in \${env}.json\`);
                  valid = false;
                }
              }
            }

            if (valid) {
              console.log('✅ All required fields present');
            } else {
              process.exit(1);
            }
          "

      - name: Create validation summary
        if: always()
        run: |
          echo "## 🔬 QA Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Configs checked**: dev.json, prod.json, copilot.json" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All configurations are valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Configuration validation failed" >> $GITHUB_STEP_SUMMARY
          fi
