version: '3.8'

services:
  # Dashboard Service
  dashboard:
    build: .
    container_name: ai-swarm-dashboard
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_USERNAME=${GH_USERNAME}
    volumes:
      - ./config:/app/config
      - swarm-data:/app/data
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - swarm-network

  # Swarm Engine Service
  swarm:
    build: .
    container_name: ai-swarm-engine
    command: node scripts/viral-swarm-final.js
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_USERNAME=${GH_USERNAME}
    volumes:
      - ./config:/app/config
      - swarm-data:/app/data
    restart: "no"
    depends_on:
      - postgres
      - dashboard
    networks:
      - swarm-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ai-swarm-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-swarm}
      - POSTGRES_USER=${POSTGRES_USER:-swarm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-swarm_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - swarm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swarm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  swarm-data:
    driver: local

networks:
  swarm-network:
    driver: bridge
