version: '3.8'

services:
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
      - auth

  admin:
    build:
      context: ../../apps/admin
      dockerfile: ../../infrastructure/docker/Dockerfile.next
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
    depends_on:
      - api

  api:
    build:
      context: ../../services/api
      dockerfile: ../../infrastructure/docker/Dockerfile.node
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-myapp}
    depends_on:
      - postgres

  auth:
    build:
      context: ../../services/auth
      dockerfile: ../../infrastructure/docker/Dockerfile.node
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-myapp}
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-myapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
