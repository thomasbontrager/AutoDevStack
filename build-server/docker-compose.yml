# AutoDevStack – Deployment Orchestration
#
# Services:
#   api          – Platform API (port 4000)
#   build-server – Clones repos, builds Docker images, runs containers (port 5000)
#   nginx        – Reverse proxy, routes subdomains to the right containers
#
# Usage:
#   docker compose up -d
#
# Environment:
#   Copy .env.example to .env and fill in the values before starting.

version: "3.9"

services:
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    image: autodevstack-api:latest
    container_name: autodevstack-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      JWT_SECRET: "${JWT_SECRET:-changeme-jwt-secret}"
      BUILD_SERVER_URL: "http://build-server:5000"
      BUILD_SECRET: "${BUILD_SECRET:-dev-build-secret}"
    volumes:
      - api-data:/app/data
    networks:
      - autodevstack
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  build-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: autodevstack-build-server:latest
    container_name: autodevstack-build-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      BUILD_SECRET: "${BUILD_SECRET:-dev-build-secret}"
      SUBDOMAIN_BASE: "${SUBDOMAIN_BASE:-localhost}"
      PORT_RANGE_START: "8100"
    volumes:
      # Mount Docker socket so the build server can run docker commands
      - /var/run/docker.sock:/var/run/docker.sock
      - build-data:/tmp/autodevstack-builds
    networks:
      - autodevstack
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: autodevstack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - autodevstack
    depends_on:
      - api
      - build-server

volumes:
  api-data:
  build-data:

networks:
  autodevstack:
    driver: bridge
