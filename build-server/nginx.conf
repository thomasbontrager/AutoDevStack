# nginx reverse proxy for AutoDevStack
#
# Routes:
#   /          → api (port 4000)
#   /build     → build-server (port 5000)
#   *.domain   → individual project containers (handled via proxy_pass to build-server)
#
# For full subdomain routing in production, replace "localhost" with your domain
# and ensure wildcard DNS is configured (*.yourdomain.com → this server).

events {
  worker_connections 1024;
}

http {
  # ── Platform API ──────────────────────────────────────────────────────────
  upstream api {
    server api:4000;
  }

  # ── Build server ──────────────────────────────────────────────────────────
  upstream build_server {
    server build-server:5000;
  }

  # ── Default server (API + build-server endpoints) ─────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    # Health check
    location /health {
      proxy_pass http://api/api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Platform API
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Build server (internal – not exposed on the default virtual host in production)
    location /build-server/ {
      proxy_pass http://build_server/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── Subdomain routing – deployed project containers ───────────────────────
  # Each deployed project is accessible at <project-name>.<SUBDOMAIN_BASE>
  # nginx resolves the subdomain and proxies to the container's allocated port.
  # In a real deployment, you would use a dynamic upstream resolver or
  # consul/service-discovery. For the MVP, the build-server returns the URL.
  #
  # Example: app1.yourdomain.com → localhost:8100
  #
  # Uncomment and configure when deploying with a real domain:
  #
  # server {
  #   listen 80;
  #   server_name ~^(?<subdomain>[a-z0-9-]+)\.yourdomain\.com$;
  #
  #   location / {
  #     proxy_pass http://localhost:8100;  # adjust port per project
  #     proxy_set_header Host $host;
  #   }
  # }
}
